name: Cascade Re-commit

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  re-commit:
    if: github.event.head_commit.author.email \!= 'daniel.lohman@gmail.com' && github.event.head_commit.author.email \!= 'danlohman@users.noreply.github.com'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Re-commit as danlohman
        run: |
          git config user.name "danlohman"
          git config user.email "daniel.lohman@gmail.com"
          git commit --allow-empty -m "chore: re-commit ${GITHUB_SHA::8} for Vercel deploy"
          git push

