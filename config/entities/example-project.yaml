# Entity: Project
# This is the example entity. Agents should study this pattern,
# then create new entity files for the target app's domain.
#
# AGENT INSTRUCTIONS:
# 1. Study this file to understand the entity schema format
# 2. Create new .yaml files for each entity in the target app
# 3. Remove this file when the app's entities are defined

name: project
displayName: Project
pluralName: Projects
description: A project that users can create and manage
icon: folder-kanban

fields:
  - name: title
    type: string
    required: true
    searchable: true
    display: true
    validation:
      minLength: 1
      maxLength: 200

  - name: description
    type: string
    required: false
    display: false
    ui: textarea

  - name: status
    type: enum
    required: true
    default: "draft"
    options: [draft, active, completed, archived]
    display: true
    filterable: true

  - name: priority
    type: enum
    required: false
    default: "medium"
    options: [low, medium, high, urgent]
    display: true
    filterable: true

  - name: dueDate
    type: date
    required: false
    display: true
    sortable: true

ownership:
  field: userId
  model: per-user

api:
  basePath: /api/v1/projects
  operations: [list, get, create, update, delete]
  pagination: true
  defaultSort: { field: createdAt, order: desc }
  defaultLimit: 20

ui:
  listLayout: table
  detailLayout: detail-sidebar
  createLayout: modal
  cardFields: [title, status, priority, dueDate]
